# ============================================================
# SonarCloud Configuration
# Docs: https://docs.sonarsource.com/sonarcloud/advanced-setup/analysis-parameters/
# ============================================================

# --- Project Identification ---
sonar.projectKey=Venkatachla_Stock-Market-Analysis
sonar.organization=venkatachla
sonar.projectName=Stock-Market-Analysis

# --- Source Directories ---
# Include both Python backend and TypeScript frontend
sonar.sources=api,backtest,btlogic,features,training,utils,strategy,trading,frontend/src

# --- Test Directories ---
sonar.tests=frontend/src/test

# --- File Exclusions (non-source files) ---
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/build/**,\
  **/__pycache__/**,\
  **/venv/**,\
  **/*.min.js,\
  **/*.min.css,\
  **/data/**,\
  **/models/**,\
  frontend/src/tailwind.config.lov.json

# --- Test File Patterns ---
sonar.test.inclusions=\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.tsx,\
  **/test_*.py,\
  **/*_test.py

# --- Coverage Reports ---
# Frontend: vitest LCOV output
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
# Backend: pytest-cov XML output
sonar.python.coverage.reportPaths=coverage.xml

# --- TypeScript Configuration ---
sonar.typescript.tsconfigPaths=frontend/tsconfig.app.json

# --- Encoding ---
sonar.sourceEncoding=UTF-8
