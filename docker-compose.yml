version: '3.8'

services:
  stockpulse-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stockpulse-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./db.sqlite3
      - SECRET_KEY=your-secret-key-change-in-production
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=1440
      - PYTHON_ENV=production
      - NODE_ENV=production
    volumes:
      - ./db.sqlite3:/app/db.sqlite3
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  db:
    driver: local
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

networks:
  stcok-network:
    driver: bridge

volumes:
  db_data:
    driver: local
