name: Docker Build & Kubernetes Deploy

on:
  push:
    branches:
      - main
      - devops/docker-k8s-cicd
      - copilot/resolve-merge-conflicts-git-action
      - fix-docker-k8s-pipeline
    paths:
      - 'api/**'
      - 'frontend/**'
      - 'requirements.txt'
      - 'frontend/package.json'
      - 'deployment/**'
      - '.github/workflows/docker-k8s-deploy.yml'
      - 'sonar-project.properties'

env:
  REGISTRY: docker.io
  BACKEND_IMAGE: venkatachalav/stockpulse-backend
  FRONTEND_IMAGE: venkatachalav/stockpulse-frontend
  ENABLE_KUBERNETES_DEPLOY: ${{ vars.ENABLE_KUBERNETES_DEPLOY || 'true' }}

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov "httpx<0.25"

      - name: Setup backend test environment
        run: |
          echo "DATABASE_URL=sqlite:///./db.sqlite3" >> $GITHUB_ENV
          echo "PYTHONUNBUFFERED=1" >> $GITHUB_ENV

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Start FastAPI Backend
        run: |
          nohup uvicorn api.app_fixed:app --host 0.0.0.0 --port 8000 > backend.log 2>&1 &
          echo $! > backend.pid
          sleep 15

      - name: Verify Backend Running
        run: |
          for i in {1..20}; do
            if curl -sf http://localhost:8000/health; then
              echo "✅ Backend is running"
              exit 0
            fi
            sleep 2
          done
          echo "❌ Backend failed health check"
          cat backend.log
          exit 1

      - name: Run backend unit tests
        run: python -m pytest tests -q

      - name: Run backend integration tests
        run: python -m pytest tests/test_endpoints.py tests/test_trading_flow.py -q

      - name: Print backend logs on failure
        if: failure()
        run: cat backend.log || true

      - name: Stop FastAPI Backend
        if: always()
        run: |
          if [ -f backend.pid ]; then
            kill "$(cat backend.pid)" 2>/dev/null || true
          fi

      - name: Run frontend linting
        run: |
          cd frontend
          npm run lint --if-present

      - name: Run frontend tests
        run: |
          cd frontend
          npm run test -- --run

      - name: Build frontend
        run: |
          cd frontend
          npm run build

  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: build-test
    if: ${{ github.event_name == 'push' }}
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov "httpx<0.25"

      - name: Generate backend coverage
        run: |
          pytest tests/ \
            --cov=api \
            --cov-report=xml \
            --cov-report=term

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Run frontend coverage
        run: |
          cd frontend
          npx vitest run --coverage --coverage.provider=v8 --coverage.reporter=lcov --coverage.reportsDirectory=coverage

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [build-test, sonarcloud]
    if: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/devops/docker-k8s-cicd' || github.ref == 'refs/heads/fix-docker-k8s-pipeline') }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        run: docker build -t venkatachalav/stockpulse-backend:latest -f deployment/docker/backend/Dockerfile .

      - name: Build frontend image
        run: docker build -t venkatachalav/stockpulse-frontend:latest -f deployment/docker/frontend/Dockerfile .

      - name: Verify Docker Images
        run: docker images

  docker-push:
    name: Docker Push
    runs-on: ubuntu-latest
    needs: docker-build
    if: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/devops/docker-k8s-cicd' || github.ref == 'refs/heads/fix-docker-k8s-pipeline') }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Validate Docker Secrets
        run: |
          if [ -z "${{ secrets.DOCKER_USERNAME }}" ] || [ -z "${{ secrets.DOCKER_PASSWORD }}" ]; then
            echo "::error::DOCKER_USERNAME and DOCKER_PASSWORD secrets are required."
            exit 1
          fi

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deployment/docker/backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deployment/docker/frontend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:latest

  kubernetes-deploy:
    name: Kubernetes Deploy
    runs-on:
      - self-hosted
      - Windows
    needs: docker-push
    if: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/devops/docker-k8s-cicd' || github.ref == 'refs/heads/fix-docker-k8s-pipeline') }}
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve Kubernetes deployment toggle
        shell: powershell
        run: |
          $ENABLE_KUBERNETES_DEPLOY = "${{ env.ENABLE_KUBERNETES_DEPLOY }}"
          if ([string]::IsNullOrWhiteSpace($ENABLE_KUBERNETES_DEPLOY)) {
            $ENABLE_KUBERNETES_DEPLOY = "true"
          }
          Write-Host "Kubernetes deployment enabled: $ENABLE_KUBERNETES_DEPLOY"

      - name: Validate kubeconfig secret
        shell: powershell
        run: |
          if ([string]::IsNullOrWhiteSpace("${{ secrets.KUBE_CONFIG_DATA }}")) {
            throw "KUBE_CONFIG_DATA secret is required for Kubernetes deployment."
          }

      - name: Setup kubeconfig
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path "$HOME\.kube"
          [System.Text.Encoding]::UTF8.GetString(
            [System.Convert]::FromBase64String("${{ secrets.KUBE_CONFIG_DATA }}")
          ) | Out-File "$HOME\.kube\config"

      - name: Verify cluster
        shell: powershell
        run: |
          kubectl cluster-info
          kubectl get nodes
          kubectl get pods -A

      - name: Create namespace
        shell: powershell
        run: |
          kubectl create namespace stockpulse --dry-run=client -o yaml | kubectl apply -f -

      - name: Create Docker registry secret
        shell: powershell
        run: |
          kubectl create secret docker-registry dockerhub-secret `
            --docker-server=docker.io `
            --docker-username="${{ secrets.DOCKER_USERNAME }}" `
            --docker-password="${{ secrets.DOCKER_PASSWORD }}" `
            --docker-email="admin@stockpulse.io" `
            -n stockpulse `
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy to Kubernetes
        shell: powershell
        run: |
          kubectl apply -f deployment/kubernetes/ -n stockpulse

      - name: Restart backend deployment
        shell: powershell
        run: |
          kubectl rollout restart deployment/stockpulse-backend -n stockpulse
          kubectl rollout status deployment/stockpulse-backend -n stockpulse --timeout=5m

      - name: Restart frontend deployment
        shell: powershell
        run: |
          kubectl rollout restart deployment/stockpulse-frontend -n stockpulse
          kubectl rollout status deployment/stockpulse-frontend -n stockpulse --timeout=5m

  deployment-verification:
    name: Deployment Verification
    runs-on:
      - self-hosted
      - Windows
    needs: kubernetes-deploy
    if: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/devops/docker-k8s-cicd' || github.ref == 'refs/heads/fix-docker-k8s-pipeline') }}
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup kubeconfig
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path "$HOME\.kube"
          [System.Text.Encoding]::UTF8.GetString(
            [System.Convert]::FromBase64String("${{ secrets.KUBE_CONFIG_DATA }}")
          ) | Out-File "$HOME\.kube\config"

      - name: Verify deployment resources
        shell: powershell
        run: |
          kubectl get deployments -n stockpulse
          kubectl get pods -n stockpulse
          kubectl get services -n stockpulse

      - name: Wait for backend pods ready
        shell: powershell
        run: kubectl wait --for=condition=ready pod -l app=stockpulse-backend -n stockpulse --timeout=300s

      - name: Wait for frontend pods ready
        shell: powershell
        run: kubectl wait --for=condition=ready pod -l app=stockpulse-frontend -n stockpulse --timeout=300s
