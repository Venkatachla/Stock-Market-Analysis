name: Docker Build & Kubernetes Deploy

on:
  push:
    branches:
      - main
      - devops/docker-k8s-cicd
      - copilot/resolve-merge-conflicts-git-action
    paths:
      - 'api/**'
      - 'frontend/**'
      - 'requirements.txt'
      - 'frontend/package.json'
      - 'deployment/**'
      - '.github/workflows/docker-k8s-deploy.yml'
  pull_request:
    branches:
      - main
      - devops/docker-k8s-cicd
      - copilot/resolve-merge-conflicts-git-action

env:
  REGISTRY: docker.io
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
  KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
  BACKEND_IMAGE: venkatachalav/stockpulse-backend
  FRONTEND_IMAGE: venkatachalav/stockpulse-frontend

jobs:
  # ═══════════════════════════════════════════════════════════
  # JOB 1: BUILD & TEST
  # ═══════════════════════════════════════════════════════════
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: Setup backend test environment
        run: |
          echo "DATABASE_URL=sqlite:///./db.sqlite3" >> $GITHUB_ENV
          echo "PYTHONUNBUFFERED=1" >> $GITHUB_ENV

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci
          cd ..

      - name: Start FastAPI Backend
        run: |
          nohup uvicorn api.app_fixed:app --host 0.0.0.0 --port 8000 > backend.log 2>&1 &
          echo $! > backend.pid
          sleep 15

      - name: Verify Backend Running
        run: |
          for i in {1..20}; do
            if curl -sf http://localhost:8000/health; then
              echo "✅ Backend is running"
              exit 0
            fi
            sleep 2
          done
          echo "❌ Backend failed health check"
          cat backend.log
          exit 1

      - name: Run backend unit tests
        run: |
          python -m pytest tests -q

      - name: Run backend integration tests
        run: |
          python -m pytest test_endpoints.py test_trading_flow.py -q

      - name: Print backend logs on failure
        if: failure()
        run: |
          cat backend.log || true

      - name: Stop FastAPI Backend
        if: always()
        run: |
          if [ -f backend.pid ]; then
            kill "$(cat backend.pid)" 2>/dev/null || true
          fi

      - name: Run frontend linting
        run: |
          cd frontend
          npm run lint --if-present
          cd ..

      - name: Build frontend
        run: |
          cd frontend
          npm run build
          cd ..

  # ═══════════════════════════════════════════════════════════
  # JOB 2: SONARCLOUD ANALYSIS
  # ═══════════════════════════════════════════════════════════
  sonar-analysis:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    needs: build-test
    if: github.event_name == 'push'
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        continue-on-error: true

  # ═══════════════════════════════════════════════════════════
  # JOB 3: DOCKER BUILD
  # ═══════════════════════════════════════════════════════════
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build-test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/devops/docker-k8s-cicd')
    
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        run: |
          docker build -t venkatachalav/stockpulse-backend:latest -f deployment/docker/backend/Dockerfile .

      - name: Build frontend image
        run: |
          docker build -t venkatachalav/stockpulse-frontend:latest -f deployment/docker/frontend/Dockerfile .

      - name: Verify Docker Images
        run: docker images

      - name: Verify backend image built
        run: |
          echo "✅ Backend Docker image built successfully"
          echo "Image: venkatachalav/stockpulse-backend:latest"

      - name: Verify frontend image built
        run: |
          echo "✅ Frontend Docker image built successfully"
          echo "Image: venkatachalav/stockpulse-frontend:latest"

  # ═══════════════════════════════════════════════════════════
  # JOB 4: DOCKER PUSH
  # ═══════════════════════════════════════════════════════════
  docker-push:
    name: Docker Push
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/devops/docker-k8s-cicd')
    
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Validate Docker Secrets
        run: |
          if [ -z "${{ secrets.DOCKER_USERNAME }}" ] || [ -z "${{ secrets.DOCKER_PASSWORD }}" ]; then
            echo "❌ Missing DOCKER_USERNAME or DOCKER_PASSWORD"
            exit 1
          fi
          echo "✅ Docker secrets configured"

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build backend image for push
        run: |
          docker build -t venkatachalav/stockpulse-backend:latest -f deployment/docker/backend/Dockerfile .

      - name: Build frontend image for push
        run: |
          docker build -t venkatachalav/stockpulse-frontend:latest -f deployment/docker/frontend/Dockerfile .

      - name: Verify Docker Images
        run: docker images

      - name: Push backend image
        run: |
          docker push venkatachalav/stockpulse-backend:latest

      - name: Push frontend image
        run: |
          docker push venkatachalav/stockpulse-frontend:latest

      - name: Log backend image tags
        run: |
          echo "✅ Backend image pushed successfully"
          echo "Tags: venkatachalav/stockpulse-backend:latest"

      - name: Log frontend image tags
        run: |
          echo "✅ Frontend image pushed successfully"
          echo "Tags: venkatachalav/stockpulse-frontend:latest"

  # ═══════════════════════════════════════════════════════════
  # JOB 5: KUBERNETES DEPLOY
  # ═══════════════════════════════════════════════════════════
  kubernetes-deploy:
    name: Kubernetes Deploy
    runs-on: ubuntu-latest
    needs: docker-push
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/devops/docker-k8s-cicd')
    permissions:
      contents: read
    
    steps:
      - name: Verify Kubernetes secrets
        run: |
          if [ -z "$KUBE_CONFIG_DATA" ]; then
            echo "❌ Missing KUBE_CONFIG_DATA"
            exit 1
          fi

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.27.0'

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "$KUBE_CONFIG_DATA" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config
          kubectl cluster-info
          echo "✅ Kubernetes cluster connected"

      - name: Create namespace
        run: |
          kubectl create namespace stockpulse --dry-run=client -o yaml | kubectl apply -f -
          echo "✅ Namespace stockpulse ready"

      - name: Create Docker registry secret
        run: |
          kubectl create secret docker-registry dockerhub-secret \
            --docker-server=docker.io \
            --docker-username=$DOCKER_USERNAME \
            --docker-password=$DOCKER_PASSWORD \
            --docker-email=admin@stockpulse.io \
            -n stockpulse \
            --dry-run=client -o yaml | kubectl apply -f -
          echo "✅ Docker registry secret configured"

      - name: Apply Kubernetes ConfigMap
        run: |
          kubectl apply -f deployment/kubernetes/configmap.yaml -n stockpulse
          echo "✅ ConfigMap applied"

      - name: Apply Kubernetes Secrets
        run: |
          kubectl apply -f deployment/kubernetes/secret.yaml -n stockpulse
          echo "✅ Secrets applied"

      - name: Deploy backend
        run: |
          kubectl apply -f deployment/kubernetes/backend-deployment.yaml -n stockpulse
          kubectl apply -f deployment/kubernetes/backend-service.yaml -n stockpulse
          echo "✅ Backend deployment applied"

      - name: Deploy frontend
        run: |
          kubectl apply -f deployment/kubernetes/frontend-deployment.yaml -n stockpulse
          kubectl apply -f deployment/kubernetes/frontend-service.yaml -n stockpulse
          echo "✅ Frontend deployment applied"

      - name: Apply Ingress
        run: |
          kubectl apply -f deployment/kubernetes/ingress.yaml -n stockpulse || true
          echo "✅ Ingress applied (or skipped if cert-manager not available)"

      - name: Restart backend deployment
        run: |
          echo "Restarting backend deployment..."
          kubectl rollout restart deployment/stockpulse-backend -n stockpulse
          echo "Waiting for backend rollout..."
          kubectl rollout status deployment/stockpulse-backend -n stockpulse --timeout=5m
          echo "✅ Backend deployment restarted"

      - name: Restart frontend deployment
        run: |
          echo "Restarting frontend deployment..."
          kubectl rollout restart deployment/stockpulse-frontend -n stockpulse
          echo "Waiting for frontend rollout..."
          kubectl rollout status deployment/stockpulse-frontend -n stockpulse --timeout=5m
          echo "✅ Frontend deployment restarted"

  # ═══════════════════════════════════════════════════════════
  # JOB 6: DEPLOYMENT VERIFICATION
  # ═══════════════════════════════════════════════════════════
  deployment-verification:
    name: Deployment Verification
    runs-on: ubuntu-latest
    needs: kubernetes-deploy
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/devops/docker-k8s-cicd')
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.27.0'

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "$KUBE_CONFIG_DATA" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config
          kubectl cluster-info

      - name: Verify pods status
        run: |
          echo "=== Pod Status ==="
          kubectl get pods -n stockpulse -o wide
          echo ""
          echo "Checking pod readiness..."
          kubectl get pods -n stockpulse -o jsonpath='{range .items[*]}{.metadata.name}{"\t"}{.status.phase}{"\t"}{.status.conditions[?(@.type=="Ready")].status}{"\n"}{end}'

      - name: Verify services
        run: |
          echo "=== Service Status ==="
          kubectl get svc -n stockpulse
          echo ""
          echo "Checking service endpoints..."
          kubectl get endpoints -n stockpulse

      - name: Check backend rollout status
        run: |
          echo "=== Backend Deployment Rollout Status ==="
          kubectl rollout status deployment/stockpulse-backend -n stockpulse --timeout=5m
          if [ $? -eq 0 ]; then
            echo "✅ Backend deployment rollout successful"
          else
            echo "❌ Backend deployment rollout failed"
            exit 1
          fi

      - name: Check frontend rollout status
        run: |
          echo "=== Frontend Deployment Rollout Status ==="
          kubectl rollout status deployment/stockpulse-frontend -n stockpulse --timeout=5m
          if [ $? -eq 0 ]; then
            echo "✅ Frontend deployment rollout successful"
          else
            echo "❌ Frontend deployment rollout failed"
            exit 1
          fi

      - name: Verify backend replicas
        run: |
          echo "=== Backend Deployment Status ==="
          kubectl get deployment stockpulse-backend -n stockpulse
          BACKEND_READY=$(kubectl get deployment -n stockpulse stockpulse-backend -o jsonpath='{.status.readyReplicas}' 2>/dev/null || echo "0")
          BACKEND_DESIRED=$(kubectl get deployment -n stockpulse stockpulse-backend -o jsonpath='{.spec.replicas}' 2>/dev/null || echo "3")
          echo "Backend Ready Replicas: $BACKEND_READY/$BACKEND_DESIRED"
          if [ "$BACKEND_READY" = "$BACKEND_DESIRED" ]; then
            echo "✅ Backend pods are ready"
          else
            echo "❌ Backend pods are not fully ready"
            exit 1
          fi

      - name: Verify frontend replicas
        run: |
          echo "=== Frontend Deployment Status ==="
          kubectl get deployment stockpulse-frontend -n stockpulse
          FRONTEND_READY=$(kubectl get deployment -n stockpulse stockpulse-frontend -o jsonpath='{.status.readyReplicas}' 2>/dev/null || echo "0")
          FRONTEND_DESIRED=$(kubectl get deployment -n stockpulse stockpulse-frontend -o jsonpath='{.spec.replicas}' 2>/dev/null || echo "2")
          echo "Frontend Ready Replicas: $FRONTEND_READY/$FRONTEND_DESIRED"
          if [ "$FRONTEND_READY" = "$FRONTEND_DESIRED" ]; then
            echo "✅ Frontend pods are ready"
          else
            echo "❌ Frontend pods are not fully ready"
            exit 1
          fi

      - name: Wait for pods to be ready
        run: |
          echo "Waiting for backend pods to be ready..."
          kubectl wait --for=condition=ready pod -l app=stockpulse-backend -n stockpulse --timeout=300s || true
          echo "Waiting for frontend pods to be ready..."
          kubectl wait --for=condition=ready pod -l app=stockpulse-frontend -n stockpulse --timeout=300s || true
          echo "✅ Pod ready checks completed"
        continue-on-error: true

      - name: Get pod logs
        if: always()
        run: |
          echo "=== Backend Logs (last 50 lines) ==="
          kubectl logs -n stockpulse -l app=stockpulse-backend --tail=50 -c backend --all-containers=true 2>/dev/null || echo "No logs available"
          echo ""
          echo "=== Frontend Logs (last 50 lines) ==="
          kubectl logs -n stockpulse -l app=stockpulse-frontend --tail=50 -c frontend --all-containers=true 2>/dev/null || echo "No logs available"
          echo ""
          echo "=== Recent Pod Events ==="
          kubectl get events -n stockpulse --sort-by='.lastTimestamp' | tail -20 || echo "No events available"

      - name: Health Check - Backend API
        run: |
          echo "Attempting backend health check..."
          timeout 60s kubectl port-forward -n stockpulse svc/backend-service 8000:8000 &
          PF_PID=$!
          sleep 3
          
          for i in {1..10}; do
            echo "Attempt $i/10: Checking backend health..."
            if curl -s -f http://localhost:8000/health 2>/dev/null | grep -q "alive"; then
              echo "✅ Backend API is healthy!"
              kill $PF_PID 2>/dev/null || true
              exit 0
            fi
            sleep 2
          done
          
          echo "⚠️ Backend health check timed out"
          kill $PF_PID 2>/dev/null || true
        continue-on-error: true

      - name: Health Check - Frontend
        run: |
          echo "Attempting frontend health check..."
          timeout 60s kubectl port-forward -n stockpulse svc/frontend-service 8080:80 &
          PF_PID=$!
          sleep 3
          
          for i in {1..10}; do
            echo "Attempt $i/10: Checking frontend health..."
            if curl -s -f http://localhost:8080/health 2>/dev/null; then
              echo "✅ Frontend is healthy!"
              kill $PF_PID 2>/dev/null || true
              exit 0
            fi
            sleep 2
          done
          
          echo "⚠️ Frontend health check timed out"
          kill $PF_PID 2>/dev/null || true
        continue-on-error: true

      - name: Final Deployment Summary
        run: |
          echo "═══════════════════════════════════════════════"
          echo "DEPLOYMENT VERIFICATION COMPLETE"
          echo "═══════════════════════════════════════════════"
          echo ""
          echo "Deployment Status:"
          kubectl get deployment -n stockpulse
          echo ""
          echo "Pod Status:"
          kubectl get pods -n stockpulse -o wide
          echo ""
          echo "Service Status:"
          kubectl get svc -n stockpulse
          echo ""
          echo "✅ Deployment verification completed"

  # ═══════════════════════════════════════════════════════════
  # JOB 7: NOTIFY STATUS
  # ═══════════════════════════════════════════════════════════
  notify:
    name: Notify Status
    runs-on: ubuntu-latest
    needs: [build-test, sonar-analysis, docker-build, docker-push, kubernetes-deploy, deployment-verification]
    if: always()
    
    steps:
      - name: Pipeline Status Report
        run: |
          echo "═══════════════════════════════════════════════"
          echo "CI/CD PIPELINE STATUS REPORT"
          echo "═══════════════════════════════════════════════"
          echo ""
          echo "Job Results:"
          echo "  Build & Test: ${{ needs.build-test.result }}"
          echo "  SonarCloud: ${{ needs.sonar-analysis.result }}"
          echo "  Docker Build: ${{ needs.docker-build.result }}"
          echo "  Docker Push: ${{ needs.docker-push.result }}"
          echo "  Kubernetes Deploy: ${{ needs.kubernetes-deploy.result }}"
          echo "  Deployment Verification: ${{ needs.deployment-verification.result }}"
          echo ""

          REQUIRE_DEPLOYMENT="false"
          if [ "${{ github.event_name }}" == "push" ] && \
             { [ "${{ github.ref }}" == "refs/heads/main" ] || [ "${{ github.ref }}" == "refs/heads/devops/docker-k8s-cicd" ]; }; then
            REQUIRE_DEPLOYMENT="true"
          fi

          if [ "${{ needs.build-test.result }}" != "success" ]; then
            echo "❌ PIPELINE FAILED"
            echo ""
            echo "Failed stages:"
            echo "  ❌ Build & Test failed"
            exit 1
          fi

          if [ "$REQUIRE_DEPLOYMENT" == "true" ] && \
             { [ "${{ needs.docker-build.result }}" != "success" ] || \
               [ "${{ needs.docker-push.result }}" != "success" ] || \
               [ "${{ needs.kubernetes-deploy.result }}" != "success" ] || \
               [ "${{ needs.deployment-verification.result }}" != "success" ]; }; then
            echo "❌ PIPELINE FAILED"
            echo ""
            echo "Failed stages:"
            [ "${{ needs.docker-build.result }}" != "success" ] && echo "  ❌ Docker Build failed"
            [ "${{ needs.docker-push.result }}" != "success" ] && echo "  ❌ Docker Push failed"
            [ "${{ needs.kubernetes-deploy.result }}" != "success" ] && echo "  ❌ Kubernetes Deploy failed"
            [ "${{ needs.deployment-verification.result }}" != "success" ] && echo "  ❌ Deployment Verification failed"
            exit 1
          fi

          if [ "$REQUIRE_DEPLOYMENT" == "true" ]; then
            echo "✅ PIPELINE COMPLETED SUCCESSFULLY!"
            echo ""
            echo "All stages completed:"
            echo "  ✅ Code tested and built"
            echo "  ✅ Code quality analyzed"
            echo "  ✅ Docker images built"
            echo "  ✅ Docker images pushed to registry"
            echo "  ✅ Kubernetes deployment updated"
            echo "  ✅ Deployment verified and healthy"
            echo ""
            echo "Production is now live!"
          else
            echo "✅ PIPELINE COMPLETED SUCCESSFULLY!"
            echo ""
            echo "Non-deployment run completed:"
            echo "  ✅ Build & Test passed"
            echo "  ℹ️ Deployment stages were not required for this event/branch"
          fi
    


