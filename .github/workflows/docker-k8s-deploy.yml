name: Docker Build & Kubernetes Deploy

on:
  push:
    branches:
      - main
      - devops/docker-k8s-cicd
      - copilot/resolve-merge-conflicts-git-action
      - fix-docker-k8s-pipeline
      - grafana-dashboard
    paths:
      - 'api/**'
      - 'frontend/**'
      - 'requirements.txt'
      - 'frontend/package.json'
      - 'deployment/**'
      - 'monitoring/**'
      - '.github/workflows/docker-k8s-deploy.yml'
      - 'sonar-project.properties'
  pull_request:
    branches:
      - main
      - devops/docker-k8s-cicd
      - copilot/resolve-merge-conflicts-git-action
      - fix-docker-k8s-pipeline

env:
  REGISTRY: docker.io
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
  KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
  ENABLE_KUBERNETES_DEPLOY: ${{ vars.ENABLE_KUBERNETES_DEPLOY || 'true' }}
  BACKEND_IMAGE: venkatachalav/stockpulse-backend
  FRONTEND_IMAGE: venkatachalav/stockpulse-frontend

jobs:
  # ═══════════════════════════════════════════════════════════
  # JOB 1: BUILD & TEST
  # ═══════════════════════════════════════════════════════════
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov "httpx<0.25"

      - name: Setup backend test environment
        run: |
          echo "DATABASE_URL=sqlite:///./db.sqlite3" >> $GITHUB_ENV
          echo "PYTHONUNBUFFERED=1" >> $GITHUB_ENV

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci
          cd ..

      - name: Start FastAPI Backend
        run: |
          nohup uvicorn api.app_fixed:app --host 0.0.0.0 --port 8000 > backend.log 2>&1 &
          echo $! > backend.pid
          sleep 15

      - name: Verify Backend Running
        run: |
          for i in {1..20}; do
            if curl -sf http://localhost:8000/health; then
              echo "✅ Backend is running"
              exit 0
            fi
            sleep 2
          done
          echo "❌ Backend failed health check"
          cat backend.log
          exit 1

      - name: Show Repository Structure
        run: |
          pwd
          ls -la
          found=0
          for dir in tests api/tests backend/tests; do
            if [ -d "$dir" ]; then
              found=1
              find "$dir" -name "test*.py"
            fi
          done
          if [ "$found" -eq 0 ]; then
            echo "No expected test directories found (tests, api/tests, backend/tests)"
          fi

      - name: Run backend unit tests
        run: |
          python -m pytest tests -q

      - name: Run backend integration tests
        run: |
          python -m pytest tests/test_endpoints.py tests/test_trading_flow.py -q

      - name: Print backend logs on failure
        if: failure()
        run: |
          cat backend.log || true

      - name: Stop FastAPI Backend
        if: always()
        run: |
          if [ -f backend.pid ]; then
            kill "$(cat backend.pid)" 2>/dev/null || true
          fi

      - name: Run frontend linting
        run: |
          cd frontend
          npm run lint --if-present
          cd ..

      - name: Build frontend
        run: |
          cd frontend
          npm run build
          cd ..

  # ═══════════════════════════════════════════════════════════
  # JOB 2: SONARCLOUD ANALYSIS
  # ═══════════════════════════════════════════════════════════
  sonarcloud-analysis:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: build-test
    if: github.event_name == 'push'
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov "httpx<0.25"

      - name: Generate backend coverage
        run: |
          pytest tests/ \
            --cov=api \
            --cov=frontend/src \
            --cov-report=xml \
            --cov-report=term

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Run frontend coverage
        run: |
          cd frontend
          npx vitest run --coverage --coverage.provider=v8 --coverage.reporter=lcov --coverage.reportsDirectory=coverage

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ═══════════════════════════════════════════════════════════
  # JOB 2B: MONITORING VERIFICATION
  # ═══════════════════════════════════════════════════════════
  monitoring-verification:
    name: Monitoring Verification
    runs-on: ubuntu-latest
    needs: build-test
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Start FastAPI Backend
        run: |
          echo "DATABASE_URL=sqlite:///./db.sqlite3" >> $GITHUB_ENV
          nohup uvicorn api.app_fixed:app --host 0.0.0.0 --port 8000 > backend.log 2>&1 &
          echo $! > backend.pid
          sleep 2

      - name: Verify Actuator Health
        run: |
          echo "Checking /actuator/health..."
          for i in {1..10}; do
            if curl -s -f http://localhost:8000/actuator/health; then
              echo -e "\n✅ Health endpoint is UP"
              exit 0
            fi
            sleep 2
          done
          echo "❌ Backend failed to start or health endpoint unreachable"
          cat backend.log
          exit 1

      - name: Verify Actuator Info
        run: |
          echo "Checking /actuator/info..."
          curl -s -f http://localhost:8000/actuator/info
          echo -e "\n✅ Info endpoint is reachable"

      - name: Verify Prometheus Metrics
        run: |
          echo "Checking /actuator/prometheus..."
          curl -s -f http://localhost:8000/actuator/prometheus > metrics.txt
          if grep -q "python_gc_" metrics.txt; then
            echo "✅ Standard Python Prometheus metrics found in output"
          else
            echo "❌ Failed to find expected metrics"
            exit 1
          fi

      - name: Stop FastAPI Backend
        if: always()
        run: |
          if [ -f backend.pid ]; then
            kill "$(cat backend.pid)" 2>/dev/null || true
          fi
          cat backend.log || true

  # ═══════════════════════════════════════════════════════════
  # JOB 2C: PROMETHEUS VERIFICATION
  # ═══════════════════════════════════════════════════════════
  prometheus-verification:
    name: Prometheus Verification
    runs-on: ubuntu-latest
    needs: monitoring-verification
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start Monitoring Stack
        run: |
          docker compose -f monitoring/docker-compose.yml up -d
          echo "Waiting for Prometheus to initialize..."
          sleep 10

      - name: Verify Prometheus Health
        run: |
          echo "Checking Prometheus health endpoint..."
          for i in {1..10}; do
            if curl -s -f http://localhost:9090/-/healthy; then
              echo -e "\n✅ Prometheus is UP and healthy"
              exit 0
            fi
            sleep 2
          done
          echo "❌ Prometheus failed to start or health endpoint unreachable"
          docker logs prometheus
          exit 1

      - name: Print Prometheus Container Status
        run: |
          docker ps --filter "name=prometheus"

      - name: Stop Monitoring Stack
        if: always()
        run: |
          docker compose -f monitoring/docker-compose.yml down

  # ═══════════════════════════════════════════════════════════
  # JOB 2D: GRAFANA VERIFICATION
  # ═══════════════════════════════════════════════════════════
  grafana-verification:
    name: Grafana Verification
    runs-on: ubuntu-latest
    needs: prometheus-verification
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start Monitoring Stack
        run: |
          docker compose -f monitoring/docker-compose.yml up -d
          echo "Waiting for Grafana to initialize..."
          sleep 15

      - name: Verify Grafana Health
        run: |
          echo "Checking Grafana health endpoint..."
          for i in {1..15}; do
            if curl -s -f http://localhost:3000/api/health; then
              echo -e "\n✅ Grafana is UP and healthy"
              exit 0
            fi
            sleep 2
          done
          echo "❌ Grafana failed to start or health endpoint unreachable"
          docker logs grafana
          exit 1

      - name: Print Grafana Container Status
        run: |
          docker ps --filter "name=grafana"

      - name: Stop Monitoring Stack
        if: always()
        run: |
          docker compose -f monitoring/docker-compose.yml down

  # ═══════════════════════════════════════════════════════════
  # JOB 3: DOCKER BUILD
  # ═══════════════════════════════════════════════════════════
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [build-test, sonarcloud-analysis]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/devops/docker-k8s-cicd' || github.ref == 'refs/heads/fix-docker-k8s-pipeline' || github.ref == 'refs/heads/grafana-dashboard')
    
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        run: |
          docker build -t venkatachalav/stockpulse-backend:latest -f deployment/docker/backend/Dockerfile .

      - name: Build frontend image
        run: |
          docker build -t venkatachalav/stockpulse-frontend:latest -f deployment/docker/frontend/Dockerfile .

      - name: Verify Docker Images
        run: docker images

      - name: Verify backend image built
        run: |
          echo "✅ Backend Docker image built successfully"
          echo "Image: venkatachalav/stockpulse-backend:latest"

      - name: Verify frontend image built
        run: |
          echo "✅ Frontend Docker image built successfully"
          echo "Image: venkatachalav/stockpulse-frontend:latest"

  # ═══════════════════════════════════════════════════════════
  # JOB 4: DOCKER PUSH
  # ═══════════════════════════════════════════════════════════
  docker-push:
    name: Docker Push
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/devops/docker-k8s-cicd' || github.ref == 'refs/heads/fix-docker-k8s-pipeline' || github.ref == 'refs/heads/grafana-dashboard')
    
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Validate Docker Secrets
        id: docker_guard
        run: |
          if [ -z "${{ secrets.DOCKER_USERNAME }}" ] || [ -z "${{ secrets.DOCKER_PASSWORD }}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "⚠️ Docker secrets not configured; skipping push."
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "✅ Docker secrets configured"

      - name: Checkout code
        if: steps.docker_guard.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        if: steps.docker_guard.outputs.skip != 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: steps.docker_guard.outputs.skip != 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata for backend
        if: steps.docker_guard.outputs.skip != 'true'
        id: backend_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Extract metadata for frontend
        if: steps.docker_guard.outputs.skip != 'true'
        id: frontend_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push backend image
        if: steps.docker_guard.outputs.skip != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./deployment/docker/backend/Dockerfile
          push: true
          tags: ${{ steps.backend_meta.outputs.tags }}
          labels: ${{ steps.backend_meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:buildcache,mode=max

      - name: Build and push frontend image
        if: steps.docker_guard.outputs.skip != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./deployment/docker/frontend/Dockerfile
          push: true
          tags: ${{ steps.frontend_meta.outputs.tags }}
          labels: ${{ steps.frontend_meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:buildcache,mode=max

      - name: Log backend image tags
        if: steps.docker_guard.outputs.skip != 'true'
        run: |
          echo "✅ Backend image pushed successfully"
          echo "Tags: ${{ steps.backend_meta.outputs.tags }}"

      - name: Log frontend image tags
        if: steps.docker_guard.outputs.skip != 'true'
        run: |
          echo "✅ Frontend image pushed successfully"
          echo "Tags: ${{ steps.frontend_meta.outputs.tags }}"

      - name: Docker push skip summary
        if: steps.docker_guard.outputs.skip == 'true'
        run: echo "⚠️ Docker push skipped — secrets not configured."

  # ═══════════════════════════════════════════════════════════
  # JOB 5: KUBERNETES DEPLOY
  # ═══════════════════════════════════════════════════════════
  kubernetes-deploy:
    name: Kubernetes Deploy
    runs-on:
      - self-hosted
      - Windows
    needs: docker-push
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/devops/docker-k8s-cicd' || github.ref == 'refs/heads/fix-docker-k8s-pipeline')
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup kubeconfig
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $kubeConfigDirectory = Join-Path $HOME '.kube'
          $kubeConfigPath = Join-Path $kubeConfigDirectory 'config'

          New-Item -ItemType Directory -Force -Path $kubeConfigDirectory | Out-Null

          $kubeConfigBase64 = "${{ secrets.KUBE_CONFIG_DATA }}"

          if ([string]::IsNullOrWhiteSpace($kubeConfigBase64)) {
              throw "KUBE_CONFIG_DATA secret is empty."
          }

          $kubeConfigBase64 = ($kubeConfigBase64.Trim() -replace '\s', '')

          if ([string]::IsNullOrWhiteSpace($kubeConfigBase64)) {
              throw "KUBE_CONFIG_DATA secret became empty after whitespace cleanup."
          }

          try {
              $kubeConfigBytes = [System.Convert]::FromBase64String($kubeConfigBase64)
          } catch {
              throw "KUBE_CONFIG_DATA is not valid Base64. Regenerate it from $HOME\.kube\config."
          }

          $kubeConfigText = [System.Text.Encoding]::UTF8.GetString($kubeConfigBytes)
          $utf8NoBom = New-Object System.Text.UTF8Encoding($false)
          [System.IO.File]::WriteAllText($kubeConfigPath, $kubeConfigText, $utf8NoBom)

          if (!(Test-Path $kubeConfigPath)) {
              throw "kubeconfig file missing after restore."
          }

          Write-Host "kubeconfig restored at: $kubeConfigPath"
          Write-Host "kubeconfig size: $((Get-Item $kubeConfigPath).Length) bytes"

      - name: Validate kubeconfig
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $kubeConfigPath = Join-Path $HOME '.kube\config'

          if (!(Test-Path $kubeConfigPath)) {
            throw "kubeconfig file missing"
          }

          $kubeConfigInfo = Get-Item $kubeConfigPath
          Write-Host "kubeconfig path: $kubeConfigPath"
          Write-Host "kubeconfig size: $($kubeConfigInfo.Length) bytes"

          try {
            Write-Host "Current context:"
            kubectl config current-context

            Write-Host "Cluster info:"
            kubectl cluster-info

            Write-Host "Cluster nodes:"
            kubectl get nodes

            Write-Host "kubeconfig validation succeeded"
          } catch {
            Write-Host "kubeconfig validation failed"
            Write-Host "kubeconfig path: $kubeConfigPath"
            Write-Host "kubeconfig size: $($kubeConfigInfo.Length) bytes"
            Write-Host "First safe lines:"
            Get-Content -Path $kubeConfigPath -TotalCount 5 | ForEach-Object {
              $safeLine = $_ -replace '[\x00-\x08\x0B\x0C\x0E-\x1F\x7F]', '?'
              Write-Host $safeLine
            }
            throw
          }

      - name: Debug Kubernetes Context
        shell: powershell
        run: |
          kubectl config current-context
          kubectl config view --minify

      - name: Verify Cluster
        shell: powershell
        run: |
          kubectl cluster-info
          kubectl get nodes
          kubectl get pods -A

      - name: Create namespace
        run: |
          kubectl create namespace stockpulse --dry-run=client -o yaml | kubectl apply -f -
          echo "✅ Namespace stockpulse ready"

      - name: Create Docker registry secret
        shell: powershell
        run: |
          kubectl create secret docker-registry dockerhub-secret `
            --docker-server=docker.io `
            --docker-username="$env:DOCKER_USERNAME" `
            --docker-password="$env:DOCKER_PASSWORD" `
            --docker-email="admin@stockpulse.io" `
            -n stockpulse `
            --dry-run=client -o yaml | kubectl apply -f -
          echo "✅ Docker registry secret configured"

      - name: Apply Kubernetes ConfigMap
        run: |
          kubectl apply -f deployment/kubernetes/configmap.yaml -n stockpulse
          echo "✅ ConfigMap applied"

      - name: Apply Kubernetes Secrets
        run: |
          kubectl apply -f deployment/kubernetes/secret.yaml -n stockpulse
          echo "✅ Secrets applied"

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f deployment/kubernetes/
          echo "✅ Kubernetes manifests applied"

      - name: Restart backend deployment
        run: |
          echo "Restarting backend deployment..."
          kubectl rollout restart deployment/stockpulse-backend -n stockpulse
          echo "Waiting for backend rollout..."
          kubectl rollout status deployment/stockpulse-backend -n stockpulse --timeout=5m
          echo "✅ Backend deployment restarted"

      - name: Restart frontend deployment
        run: |
          echo "Restarting frontend deployment..."
          kubectl rollout restart deployment/stockpulse-frontend -n stockpulse
          echo "Waiting for frontend rollout..."
          kubectl rollout status deployment/stockpulse-frontend -n stockpulse --timeout=5m
          echo "✅ Frontend deployment restarted"

  # ═══════════════════════════════════════════════════════════
  # JOB 6: DEPLOYMENT VERIFICATION
  # ═══════════════════════════════════════════════════════════
  deployment-verification:
    name: Deployment Verification
    runs-on:
      - self-hosted
      - Windows
    needs: kubernetes-deploy
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/devops/docker-k8s-cicd' || github.ref == 'refs/heads/fix-docker-k8s-pipeline')
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup kubeconfig
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $kubeConfigDirectory = Join-Path $HOME '.kube'
          $kubeConfigPath = Join-Path $kubeConfigDirectory 'config'

          New-Item -ItemType Directory -Force -Path $kubeConfigDirectory | Out-Null

          $kubeConfigBase64 = "${{ secrets.KUBE_CONFIG_DATA }}"

          if ([string]::IsNullOrWhiteSpace($kubeConfigBase64)) {
              throw "KUBE_CONFIG_DATA secret is empty."
          }

          $kubeConfigBase64 = ($kubeConfigBase64.Trim() -replace '\s', '')

          if ([string]::IsNullOrWhiteSpace($kubeConfigBase64)) {
              throw "KUBE_CONFIG_DATA secret became empty after whitespace cleanup."
          }

          try {
              $kubeConfigBytes = [System.Convert]::FromBase64String($kubeConfigBase64)
          } catch {
              throw "KUBE_CONFIG_DATA is not valid Base64. Regenerate it from $HOME\.kube\config."
          }

          $kubeConfigText = [System.Text.Encoding]::UTF8.GetString($kubeConfigBytes)
          $utf8NoBom = New-Object System.Text.UTF8Encoding($false)
          [System.IO.File]::WriteAllText($kubeConfigPath, $kubeConfigText, $utf8NoBom)

          if (!(Test-Path $kubeConfigPath)) {
              throw "kubeconfig file missing after restore."
          }

          Write-Host "kubeconfig restored at: $kubeConfigPath"
          Write-Host "kubeconfig size: $((Get-Item $kubeConfigPath).Length) bytes"

      - name: Validate kubeconfig
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $kubeConfigPath = Join-Path $HOME '.kube\config'

          if (!(Test-Path $kubeConfigPath)) {
            throw "kubeconfig file missing"
          }

          $kubeConfigInfo = Get-Item $kubeConfigPath
          Write-Host "kubeconfig path: $kubeConfigPath"
          Write-Host "kubeconfig size: $($kubeConfigInfo.Length) bytes"

          try {
            Write-Host "Current context:"
            kubectl config current-context

            Write-Host "Cluster info:"
            kubectl cluster-info

            Write-Host "Cluster nodes:"
            kubectl get nodes

            Write-Host "kubeconfig validation succeeded"
          } catch {
            Write-Host "kubeconfig validation failed"
            Write-Host "kubeconfig path: $kubeConfigPath"
            Write-Host "kubeconfig size: $($kubeConfigInfo.Length) bytes"
            Write-Host "First safe lines:"
            Get-Content -Path $kubeConfigPath -TotalCount 5 | ForEach-Object {
              $safeLine = $_ -replace '[\x00-\x08\x0B\x0C\x0E-\x1F\x7F]', '?'
              Write-Host $safeLine
            }
            throw
          }

      - name: Debug Kubernetes Context
        shell: powershell
        run: |
          kubectl config current-context
          kubectl config view --minify

      - name: Verify Cluster
        shell: powershell
        run: |
          kubectl cluster-info
          kubectl get nodes
          kubectl get pods -A

      - name: Verify Deployments
        shell: powershell
        run: |
          kubectl get deployments -n stockpulse
          kubectl get pods -n stockpulse
          kubectl get services -n stockpulse

      - name: Wait for Deployments
        shell: powershell
        run: |
          kubectl rollout status deployment/stockpulse-backend -n stockpulse --timeout=180s
          kubectl rollout status deployment/stockpulse-frontend -n stockpulse --timeout=180s

      - name: Verify backend replicas
        shell: powershell
        run: |
          Write-Host "=== Backend Deployment Status ==="
          kubectl get deployment stockpulse-backend -n stockpulse
          $BACKEND_READY = (kubectl get deployment -n stockpulse stockpulse-backend -o jsonpath='{.status.readyReplicas}' 2>$null)
          if ([string]::IsNullOrWhiteSpace($BACKEND_READY)) { $BACKEND_READY = "0" }
          $BACKEND_DESIRED = (kubectl get deployment -n stockpulse stockpulse-backend -o jsonpath='{.spec.replicas}' 2>$null)
          if ([string]::IsNullOrWhiteSpace($BACKEND_DESIRED)) { $BACKEND_DESIRED = "3" }
          Write-Host "Backend Ready Replicas: $BACKEND_READY/$BACKEND_DESIRED"
          if ($BACKEND_READY -eq $BACKEND_DESIRED) {
            Write-Host "✅ Backend pods are ready"
          } else {
            Write-Host "❌ Backend pods are not fully ready"
            exit 1
          }

      - name: Verify frontend replicas
        shell: powershell
        run: |
          Write-Host "=== Frontend Deployment Status ==="
          kubectl get deployment stockpulse-frontend -n stockpulse
          $FRONTEND_READY = (kubectl get deployment -n stockpulse stockpulse-frontend -o jsonpath='{.status.readyReplicas}' 2>$null)
          if ([string]::IsNullOrWhiteSpace($FRONTEND_READY)) { $FRONTEND_READY = "0" }
          $FRONTEND_DESIRED = (kubectl get deployment -n stockpulse stockpulse-frontend -o jsonpath='{.spec.replicas}' 2>$null)
          if ([string]::IsNullOrWhiteSpace($FRONTEND_DESIRED)) { $FRONTEND_DESIRED = "2" }
          Write-Host "Frontend Ready Replicas: $FRONTEND_READY/$FRONTEND_DESIRED"
          if ($FRONTEND_READY -eq $FRONTEND_DESIRED) {
            Write-Host "✅ Frontend pods are ready"
          } else {
            Write-Host "❌ Frontend pods are not fully ready"
            exit 1
          }

      - name: Wait for pods to be ready
        shell: powershell
        run: |
          Write-Host "Waiting for backend pods to be ready..."
          kubectl wait --for=condition=ready pod -l app=stockpulse-backend -n stockpulse --timeout=300s
          Write-Host "Waiting for frontend pods to be ready..."
          kubectl wait --for=condition=ready pod -l app=stockpulse-frontend -n stockpulse --timeout=300s
          Write-Host "✅ Pod ready checks completed"

      - name: Show Kubernetes Events
        if: always()
        continue-on-error: true
        shell: powershell
        run: |
          Write-Host "=== Recent Kubernetes Events ==="
          $events = kubectl get events -n stockpulse --sort-by='.lastTimestamp' 2>$null
          if ($LASTEXITCODE -eq 0) {
            $events | Select-Object -Last 20
          } else {
            Write-Host "No events found"
          }

      - name: Health Check - Backend API
        shell: powershell
        run: |
          Write-Host "Attempting backend health check..."
          $pfProcess = Start-Process kubectl -ArgumentList "port-forward -n stockpulse svc/backend-service 8000:8000" -PassThru -NoNewWindow
          Start-Sleep -Seconds 3
          
          $healthy = $false
          for ($i=1; $i -le 10; $i++) {
              Write-Host "Attempt $i/10: Checking backend health..."
              try {
                  $response = Invoke-RestMethod -Uri "http://localhost:8000/health" -Method Get -ErrorAction Stop
                  if (($response | ConvertTo-Json -Depth 5) -match "alive" -or $response.status -eq "ok") {
                      Write-Host "✅ Backend API is healthy!"
                      
                      try {
                          $metrics = Invoke-WebRequest -Uri "http://localhost:8000/metrics" -Method Get -ErrorAction Stop
                          if ($metrics.Content -match "python_gc_") {
                              Write-Host "✅ Prometheus metrics endpoint is healthy!"
                          } else {
                              Write-Host "⚠️ Prometheus metrics endpoint check failed"
                          }
                      } catch {
                          Write-Host "⚠️ Prometheus metrics endpoint timed out"
                      }
                      
                      $healthy = $true
                      break
                  }
              } catch {
                  # Ignore errors while waiting
              }
              Start-Sleep -Seconds 2
          }
          
          if (-not $healthy) {
              Write-Host "⚠️ Backend health check timed out"
          }
          
          if ($pfProcess -and -not $pfProcess.HasExited) {
              Stop-Process -Id $pfProcess.Id -Force -ErrorAction SilentlyContinue
          }
        continue-on-error: true

      - name: Health Check - Frontend
        shell: powershell
        run: |
          Write-Host "Attempting frontend health check..."
          $pfProcess = Start-Process kubectl -ArgumentList "port-forward -n stockpulse svc/frontend-service 8080:80" -PassThru -NoNewWindow
          Start-Sleep -Seconds 3
          
          $healthy = $false
          for ($i=1; $i -le 10; $i++) {
              Write-Host "Attempt $i/10: Checking frontend health..."
              try {
                  $response = Invoke-RestMethod -Uri "http://localhost:8080/health" -Method Get -ErrorAction Stop
                  Write-Host "✅ Frontend is healthy!"
                  $healthy = $true
                  break
              } catch {
                  # Ignore errors while waiting
              }
              Start-Sleep -Seconds 2
          }
          
          if (-not $healthy) {
              Write-Host "⚠️ Frontend health check timed out"
          }
          
          if ($pfProcess -and -not $pfProcess.HasExited) {
              Stop-Process -Id $pfProcess.Id -Force -ErrorAction SilentlyContinue
          }
        continue-on-error: true

      - name: Final Deployment Summary
        shell: powershell
        run: |
          Write-Host "═══════════════════════════════════════════════"
          Write-Host "DEPLOYMENT VERIFICATION COMPLETE"
          Write-Host "═══════════════════════════════════════════════"
          Write-Host ""
          Write-Host "Deployment Status:"
          kubectl get deployments -n stockpulse
          Write-Host ""
          Write-Host "Pod Status:"
          kubectl get pods -n stockpulse -o wide
          Write-Host ""
          Write-Host "Service Status:"
          kubectl get services -n stockpulse
          Write-Host ""
          Write-Host "✅ Deployment verification completed"

  # ═══════════════════════════════════════════════════════════
  # JOB 7: NOTIFY STATUS
  # ═══════════════════════════════════════════════════════════
  notify:
    name: Notify Status
    runs-on: ubuntu-latest
    needs: [build-test, sonarcloud-analysis, monitoring-verification, docker-build, docker-push, kubernetes-deploy, deployment-verification]
    if: always()
    
    steps:
      - name: Pipeline Status Report
        run: |
          echo "═══════════════════════════════════════════════"
          echo "CI/CD PIPELINE STATUS REPORT"
          echo "═══════════════════════════════════════════════"
          echo ""
          echo "Job Results:"
          echo "  Build & Test: ${{ needs.build-test.result }}"
          echo "  SonarCloud: ${{ needs.sonarcloud-analysis.result }}"
          echo "  Monitoring Verification: ${{ needs.monitoring-verification.result }}"
          echo "  Docker Build: ${{ needs.docker-build.result }}"
          echo "  Docker Push: ${{ needs.docker-push.result }}"
          echo "  Kubernetes Deploy: ${{ needs.kubernetes-deploy.result }}"
          echo "  Deployment Verification: ${{ needs.deployment-verification.result }}"
          echo ""
          
          # ── Step 1: Build & Test is always mandatory ──
          if [ "${{ needs.build-test.result }}" != "success" ]; then
            echo "❌ PIPELINE FAILED: Build & Test did not succeed"
            exit 1
          fi

          # ── Step 2: SonarCloud — failure/cancelled is bad; skipped is OK (e.g. PRs) ──
          SONAR_RESULT="${{ needs.sonarcloud-analysis.result }}"
          if [ "$SONAR_RESULT" == "failure" ] || [ "$SONAR_RESULT" == "cancelled" ]; then
            echo "❌ PIPELINE FAILED: SonarCloud analysis failed"
            exit 1
          fi

          # ── Step 2.5: Monitoring Verification ──
          MONITORING_RESULT="${{ needs.monitoring-verification.result }}"
          if [ "$MONITORING_RESULT" == "failure" ] || [ "$MONITORING_RESULT" == "cancelled" ]; then
            echo "❌ PIPELINE FAILED: Monitoring Verification failed"
            exit 1
          fi

          # ── Step 3: Check optional deployment stages ──
          # A result of 'success' or 'skipped' is acceptable for optional jobs.
          PIPELINE_OK=true
          FAILED_STAGES=""

          for JOB_PAIR in \
            "Docker Build:${{ needs.docker-build.result }}" \
            "Docker Push:${{ needs.docker-push.result }}" \
            "Kubernetes Deploy:${{ needs.kubernetes-deploy.result }}" \
            "Deployment Verification:${{ needs.deployment-verification.result }}"; do
            JOB_NAME="${JOB_PAIR%%:*}"
            JOB_RESULT="${JOB_PAIR##*:}"
            if [ "$JOB_RESULT" == "failure" ] || [ "$JOB_RESULT" == "cancelled" ]; then
              PIPELINE_OK=false
              FAILED_STAGES="$FAILED_STAGES\n  ❌ $JOB_NAME ($JOB_RESULT)"
            fi
          done

          if [ "$PIPELINE_OK" != "true" ]; then
            echo "❌ PIPELINE FAILED"
            echo ""
            echo "Failed stages:"
            echo -e "$FAILED_STAGES"
            exit 1
          fi

          # ── Step 4: Print success summary ──
          echo "✅ PIPELINE COMPLETED SUCCESSFULLY!"
          echo ""

          # Check if this was a full deployment run
          if [ "${{ needs.kubernetes-deploy.result }}" == "success" ] && \
             [ "${{ needs.deployment-verification.result }}" == "success" ]; then
            echo "All stages completed:"
            echo "  ✅ Code tested and built"
            echo "  ✅ Code quality analyzed"
            echo "  ✅ Docker images built and pushed"
            echo "  ✅ Kubernetes deployment updated and verified"
            echo ""
            echo "Production is now live!"
          else
            echo "Pipeline completed (some optional stages were skipped):"
            echo "  ✅ Build & Test passed"
            [ "$SONAR_RESULT" == "success" ] && echo "  ✅ SonarCloud analysis passed"
            [ "$SONAR_RESULT" == "skipped" ] && echo "  ⚠️  SonarCloud skipped (PR or branch filter)"
            [ "${{ needs.docker-build.result }}" == "success" ] && echo "  ✅ Docker images built"
            [ "${{ needs.docker-build.result }}" == "skipped" ] && echo "  ⚠️  Docker Build skipped"
            [ "${{ needs.docker-push.result }}" == "success" ] && echo "  ✅ Docker images pushed"
            [ "${{ needs.docker-push.result }}" == "skipped" ] && echo "  ⚠️  Docker Push skipped"
            [ "${{ needs.kubernetes-deploy.result }}" == "skipped" ] && echo "  ⚠️  Kubernetes Deploy skipped"
            [ "${{ needs.deployment-verification.result }}" == "skipped" ] && echo "  ⚠️  Deployment Verification skipped"
          fi

