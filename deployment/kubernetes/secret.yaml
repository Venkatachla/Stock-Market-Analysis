apiVersion: v1
kind: Secret
metadata:
  name: stockpulse-secret
  namespace: stockpulse
type: Opaque
data:
  # Note: These should be base64 encoded. Use: echo -n 'value' | base64
  # Replace with actual values during deployment
  DATABASE_URL: "" # Base64 encoded
  JWT_SECRET: "" # Base64 encoded
  NEWS_API_KEY: "" # Base64 encoded
  DOCKER_REGISTRY_PASSWORD: "" # Base64 encoded
---
apiVersion: v1
kind: Secret
metadata:
  name: dockerhub-secret
  namespace: stockpulse
type: kubernetes.io/dockercfg
data:
  .dockercfg: "" # Base64 encoded Docker config
