apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: stockpulse-ingress
  namespace: stockpulse
  annotations:
    # TLS is optional - remove or disable cert-manager requirement if not installed
    # cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/rate-limit: "100"
spec:
  ingressClassName: nginx
  # TLS configuration - uncomment if cert-manager is installed
  # tls:
  #   - hosts:
  #       - stockpulse.example.com
  #     secretName: stockpulse-tls
  rules:
    - host: stockpulse.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 8000
    # Default rule for any host
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 8000
