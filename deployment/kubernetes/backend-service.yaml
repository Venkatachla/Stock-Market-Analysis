apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: stockpulse
  labels:
    app: stockpulse-backend
spec:
  type: ClusterIP
  selector:
    app: stockpulse-backend
  ports:
    - name: http
      port: 8000
      targetPort: http
      protocol: TCP
  sessionAffinity: None
  ipFamilyPolicy: SingleStack
