apiVersion: apps/v1
kind: Deployment
metadata:
  name: stockpulse-frontend
  labels:
    app: stockpulse
    component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: stockpulse
      component: frontend
  template:
    metadata:
      labels:
        app: stockpulse
        component: frontend
    spec:
      containers:
        - name: frontend
          image: your-dockerhub-username/stockpulse-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
