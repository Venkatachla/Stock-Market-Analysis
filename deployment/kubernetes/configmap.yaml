apiVersion: v1
kind: ConfigMap
metadata:
  name: stockpulse-config
  labels:
    app: stockpulse
data:
  API_HOST: "0.0.0.0"
  API_PORT: "8000"
  # SQLite is suitable for development/demo; use external DB or persistent storage for production.
  DATABASE_URL: "sqlite:///./db.sqlite3"
  ALGORITHM: "HS256"
  ACCESS_TOKEN_EXPIRE_MINUTES: "1440"
  PYTHON_ENV: "production"
  DEBUG: "false"
  LOG_LEVEL: "INFO"
