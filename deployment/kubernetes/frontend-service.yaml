apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: stockpulse
  labels:
    app: stockpulse-frontend
spec:
  type: LoadBalancer
  selector:
    app: stockpulse-frontend
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
  sessionAffinity: None
